name: Dart

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@9a04e6d73cca37bd455e0608d7e5092f881fd603
        with:
          # Pinned so `dart format` output is reproducible. The "Verify examples
          # compile" step byte-compares committed .dart against freshly formatted
          # output; an unpinned (latest) SDK drifts whenever the formatter changes
          # (e.g. the tall-style formatter in Dart 3.7). Bump deliberately and
          # regenerate examples when upgrading.
          sdk: 3.12.2

      - name: Install dependencies
        run: dart pub get

      - name: Analyze project source
        run: dart analyze

      - name: Run tests
        run: dart test

      - name: Verify examples compile
        run: |
          for f in example/**/*.dmacro example/*.dmacro; do
            dart run bin/dmacro.dart compile "$f" --check || exit 1
          done

      - name: Verify package is publishable
        run: dart pub publish --dry-run
